services:
  db:
    image: postgres:17-bookworm
    environment:
      POSTGRES_DB: ping
      POSTGRES_USER: postgres
      POSTGRES_HOST_AUTH_METHOD: trust
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-d", "ping"]
      interval: 10s
      timeout: 10s
      retries: 3

  api:
    build:
      context: ./apps/api
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ping
      DB_USER: postgres
      DB_PASSWORD: postgres
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://db:5432/ping
      FILESYSTEM_DEFAULT_PATH: /tmp/ping
      PING_EXECUTION_WORKDIR: /tmp/ping-exec
      LOG_FILE: /tmp/ping/app.log
      ERROR_LOG_FILE: /tmp/ping/error.log
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/ping-exec:/tmp/ping-exec
    depends_on:
      db:
        condition: service_healthy
