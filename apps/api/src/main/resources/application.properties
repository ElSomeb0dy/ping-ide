# Enable HTTP
quarkus.http.insecure-requests=enabled
# Setup PostgreSQL
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=postgres
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/ping
%prod.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/ping
quarkus.transaction-manager.default-transaction-timeout=3000s
quarkus.hibernate-orm.log.queries-slower-than-ms=200
quarkus.hibernate-orm.database.generation=update
# Set port
quarkus.http.port=8080
quarkus.devservices.enabled=true
%test.quarkus.devservices.enabled=false

# Allow the Vite frontend to call the API during local development.
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:5173,http://127.0.0.1:5173
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with
quarkus.http.cors.exposed-headers=authorization,content-type
quarkus.http.cors.access-control-allow-credentials=true

mp.jwt.verify.publickey.location=publicKey.pem
mp.jwt.verify.issuer=ping
smallrye.jwt.sign.key.location=privateKey.pem

# Local demo bootstrap account. Disable or override for non-demo deployments.
ping.bootstrap.admin.enabled=true
ping.bootstrap.admin.login=admin.admin
ping.bootstrap.admin.password=admin

# Docker-based code execution limits.
ping.execution.timeout-seconds=15
ping.execution.max-concurrent=2
ping.execution.memory=128m
ping.execution.cpus=0.5
ping.execution.workdir=/tmp/ping-exec